{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static './css/style.css' %}">
</head>

<body>
    <header class="header">
        <!-- Primary nav -->
        <div class="primary-header">
            <div class="container">
                <nav>
                    <a href="#">Home</a>
                    <a href="#">About</a>
                    <a href="#">FAQ</a>
                    <a href="#">Contact us</a>
                </nav>
                <nav>
                    <a href="#"><img src="{% static './img/threads.svg' %}" alt="Threads"></a>
                    <a href="#"><img src="{% static './img/telegram.svg' %}" alt="Telegram"></a>
                    <a href="#"><img src="{% static './img/instagram.svg' %}" alt="Instagram"></a>
                </nav>
            </div>
        </div>

        <!-- Logo / login / phone — full width -->
        <div class="secondary-header">
            <div class="container-fluid">
                <a href="{% url 'admin:index' %}">
                    <img src="{% static './img/user.svg' %}" alt="">
                    <span>Login</span>
                </a>
                <a href="#" class="logo">
                    <img src="{% static './img/logo.svg' %}" alt="Logo">
                </a>
                <a href="#">
                    <img src="{% static './img/phone.svg' %}" alt="">  <!-- fix: закрывающая % была неправильной -->
                    <span>+7 777 123 45 67</span>
                </a>
            </div>
        </div>

        <!-- Categories nav — full width -->
        <div class="third-header">
            <div class="container-fluid">
                <nav>
                    <a href="{% url 'all_news_page' %}">All news</a>
                    {% for category in categories %}
                    <a href="{% url 'news_by_category' pk=category.pk %}">{{ category.name }}</a>
                    {% endfor %}
                </nav>
                <a href="{% url 'search_page' %}">
                    <img src="{% static './img/search.svg' %}" alt="">
                    <span>Search</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <a href="#"><img src="{% static './img/logo-white.svg' %}" alt="Logo"></a>
            <p>&copy; TOO Qaznews 2026, All rights reserved.</p>
        </div>
    </footer>

    <!-- Mobile Bottom Navigation -->
   <nav class="mobile-nav">
        <a href="{% url 'home_page' %}" class="mobile-bottom-nav__item {% if request.resolver_match.url_name == 'home_page' %}active{% endif %}">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
                <path d="M9 21V12h6v9"/>
            </svg>
        </a>
        <a href="{% url 'search_page' %}" class="mobile-bottom-nav__item {% if request.resolver_match.url_name == 'search_page' or request.resolver_match.url_name == 'search_results' %}active{% endif %}">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </a>
        <a href="{% url 'admin:index' %}" class="mobile-bottom-nav__item">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </a>
    </nav>

</body>

</html>
